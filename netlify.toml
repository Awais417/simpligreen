[build]
  command   = "npm run build:netlify"
  functions = "netlify/functions"
  publish   = "public"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler          = "esbuild"
  external_node_modules = ["@prisma/client", "prisma"]

# Route all traffic through the single Express function
[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/api"
  status = 200
  force  = true
